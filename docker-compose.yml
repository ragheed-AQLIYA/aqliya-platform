version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/aqliya
      - AUTH_SECRET=change-me-in-production-use-openssl-rand-base64-32
      - NEXTAUTH_URL=http://localhost:3000
      - DOWNLOAD_TOKEN_SECRET=change-me-in-production-use-openssl-rand-base64-32
      - LOCAL_STORAGE_DIR=/app/uploads
      - STORAGE_PROVIDER=local
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aqliya
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  uploads:
