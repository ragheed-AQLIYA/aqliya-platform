      devCost: "engineering-weeks: 20"
      marketOpportunity: "Saudi content compliance market"
      timeHorizon: "24 months"
    expected:
      outputType: "roi_analysis"
      totalInvestment: "string"
      annualBenefit: "string"
      paybackPeriod: "string"
      netPresentValue: "string"
      internalRateOfReturn: "string"
      marketValidation: "string — TAM/SAM captured"
      riskFactors: "array of {risk, impact, probability}"
      recommendation: "string"
    tags:
      - "baseline"
      - "product"
  - id: "sample-003"
    description: "Cost-benefit analysis for on-prem vs cloud deployment"
