version: 1
skillId: "skill:business:roi-analysis"
createdAt: "2026-06-15T22:00:00Z"
description: "Baseline evaluation dataset with 3 samples for ROI analysis"
samples:
  - id: "sample-001"
    description: "ROI analysis for AI-assisted audit review feature"
    input:
      feature: "AI audit review"
      devCost: "engineering-weeks: 12"
      expectedBenefit: "reduced review time by 40%"
      timeHorizon: "12 months"
    expected:
      outputType: "roi_analysis"
      totalInvestment: "string — SAR development + infra cost"
      annualBenefit: "string — SAR expected annual benefit"
      paybackPeriod: "string — months to break-even"
      netPresentValue: "string — NPV estimate"
      internalRateOfReturn: "string — IRR percentage"
      riskFactors: "array of {risk, impact, probability}"
      recommendation: "string"
    tags:
      - "baseline"
      - "feature"
  - id: "sample-002"
    description: "ROI for LocalContentOS product development initiative"
