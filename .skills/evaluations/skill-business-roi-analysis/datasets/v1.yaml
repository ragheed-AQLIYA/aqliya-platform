      initiative: "On-prem deployment package"
      devCost: "engineering-weeks: 30"
      ongoingOpsCost: "SAR/month estimate"
      revenuePerCustomer: "SAR/year"
    expected:
      outputType: "roi_analysis"
      totalInvestment: "string"
      annualBenefit: "string"
      paybackPeriod: "string"
      breakEvenCustomers: "number — customers needed to break even"
