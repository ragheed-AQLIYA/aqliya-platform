name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        # IC-01: pgvector required for DocumentChunk embedding columns in schema
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: aqliya_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/aqliya_ci
      AUTH_SECRET: ci-auth-secret-minimum-32-characters
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to CI database
        run: |
          npx prisma db push --force-reset --accept-data-loss || true
          PGPASSWORD=ci psql -h localhost -U ci -d aqliya_ci -c "CREATE EXTENSION IF NOT EXISTS vector;"
          npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/aqliya_ci

      - name: Type-check
        run: npx tsc --noEmit
        env:
          NODE_ENV: development

      - name: Unit + integration tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true
