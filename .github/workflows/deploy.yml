name: Deploy to AWS

on:
  push:
    branches: [main, staging]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/**"
      - "!.github/workflows/deploy.yml"

env:
  NODE_VERSION: "22"
  AWS_REGION: me-south-1
  ECR_REPOSITORY: aqliya/${{ github.ref_name == 'main' && 'production' || 'staging' }}/app

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/aqliya_ci
      AUTH_SECRET: ci-auth-secret-minimum-32-characters
      NODE_ENV: development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --ignore-scripts

      - run: npx prisma generate

      - run: npx tsc --noEmit

  terraform:
    name: Terraform
    needs: [test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config=environments/${{ github.ref_name == 'main' && 'production' || 'staging' }}/backend.tf

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file=environments/${{ github.ref_name == 'main' && 'production' || 'staging' }}/terraform.tfvars \
            -out=tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: infra/terraform/tfplan

  build-and-push:
    name: Build & Push Docker Image
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY"
          docker build \
            --build-arg NODE_ENV=production \
            -t "$IMAGE:$IMAGE_TAG" \
            -t "$IMAGE:latest" \
            .
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:latest"

      - name: Update ECS service with new image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          CLUSTER: aqliya-${{ github.ref_name == 'main' && 'production' || 'staging' }}-cluster
          SERVICE: aqliya-${{ github.ref_name == 'main' && 'production' || 'staging' }}-service
        run: |
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

  deploy:
    name: Apply Terraform
    needs: [terraform, build-and-push]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.sha }}
          path: infra/terraform

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config=environments/${{ github.ref_name == 'main' && 'production' || 'staging' }}/backend.tf

      - name: Terraform Apply
        run: terraform apply tfplan

  post-deploy:
    name: Post-Deploy Verification
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Wait for Deployment
        run: sleep 60

      - name: Comprehensive Smoke Test
        env:
          BASE_URL: ${{ github.ref_name == 'main' && 'https://aqliya.com' || 'https://staging.aqliya.com' }}
          SCIM_API_KEY: ${{ secrets.SCIM_API_KEY || '' }}
          AUTH_TOKEN: ${{ secrets.SMOKE_TEST_TOKEN || '' }}
          GIT_SHA: ${{ github.sha }}
          NODE_ENV: production
        run: node scripts/platform/post-deploy-smoke.mjs --base-url "$BASE_URL"
