version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/aqliya_staging
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXTAUTH_URL=https://staging.aqliya.ai
      - DOWNLOAD_TOKEN_SECRET=${DOWNLOAD_TOKEN_SECRET}
      - LOCAL_STORAGE_DIR=/app/uploads
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - RATE_LIMITER=${RATE_LIMITER:-redis}
      - REDIS_URL=redis://redis:6379
      - FF_AI_REAL_PROVIDERS=true
      - FF_AI_COST_TRACKING=true
      - FF_QUEUE_ENABLED=true
      - FF_TENANT_LIFECYCLE=true
      # SSO / SCIM (L0-05, L0-06)
      - SCIM_API_KEY=${SCIM_API_KEY}
      - SSO_DEFAULT_ORG_ID=${SSO_DEFAULT_ORG_ID}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET}
      - AUTH_AZURE_AD_ID=${AUTH_AZURE_AD_ID}
      - AUTH_AZURE_AD_TENANT_ID=${AUTH_AZURE_AD_TENANT_ID}
      - AUTH_AZURE_AD_SECRET=${AUTH_AZURE_AD_SECRET}
      - AUTH_OKTA_ID=${AUTH_OKTA_ID}
      - AUTH_OKTA_SECRET=${AUTH_OKTA_SECRET}
      - AUTH_OKTA_ISSUER=${AUTH_OKTA_ISSUER}
      - AUTH_OIDC_ISSUER=${AUTH_OIDC_ISSUER}
      - AUTH_OIDC_CLIENT_ID=${AUTH_OIDC_CLIENT_ID}
      - AUTH_OIDC_CLIENT_SECRET=${AUTH_OIDC_CLIENT_SECRET}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    # IC-01: pgvector extension required for DocumentChunk embeddings (staging only)
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aqliya_staging
    ports:
      - "5432:5432"
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata_staging:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata_staging:
  uploads:
  redisdata_staging:
