    description: In-app notifications and user preferences
  - name: Health
    description: Health check endpoints
  - name: Authentication
    description: Authentication and session
  - name: Platform
    description: Platform-level metrics and operations
  - name: Monitoring
    description: System monitoring and queue management
  - name: AI
    description: AI provider management and governance
  - name: AuditOS
    description: AuditOS product APIs
  - name: LocalContentOS
    description: LocalContentOS product APIs
  - name: DecisionOS
    description: DecisionOS product APIs
  - name: Office AI
    description: Office AI Assistant APIs
  - name: WorkflowOS
    description: WorkflowOS (Sunbul) APIs
  - name: Public
    description: Public unauthenticated endpoints
  - name: Developer
    description: Developer tools and API metadata
